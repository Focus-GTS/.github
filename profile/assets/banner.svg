<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="340" viewBox="0 0 1280 340" role="img" aria-label="Focus GTS — The AI agent layer for the Adobe Experience Cloud">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1c"/>
      <stop offset="0.55" stop-color="#0e1830"/>
      <stop offset="1" stop-color="#0a1226"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff3b30"/>
      <stop offset="1" stop-color="#d31510"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="340" rx="14" fill="url(#bg)"/>

  <!-- subtle node/agent motif, right side -->
  <g stroke="#2a3a5e" stroke-width="1.5" opacity="0.55" fill="none">
    <line x1="980" y1="80" x2="1120" y2="60"/>
    <line x1="980" y1="80" x2="1060" y2="160"/>
    <line x1="1120" y1="60" x2="1190" y2="140"/>
    <line x1="1060" y1="160" x2="1190" y2="140"/>
    <line x1="1060" y1="160" x2="1100" y2="260"/>
    <line x1="1190" y1="140" x2="1100" y2="260"/>
  </g>
  <g fill="#3d5891" opacity="0.85">
    <circle cx="980" cy="80" r="5"/>
    <circle cx="1120" cy="60" r="5"/>
    <circle cx="1060" cy="160" r="6"/>
    <circle cx="1190" cy="140" r="5"/>
    <circle cx="1100" cy="260" r="5"/>
  </g>

  <!-- Adobe-adjacent accent edge -->
  <rect x="0" y="0" width="9" height="340" rx="4" fill="url(#accent)"/>

  <!-- wordmark -->
  <text x="64" y="118" font-family="Helvetica, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="2" fill="#ffffff">FOCUS GTS</text>

  <!-- tagline -->
  <text x="66" y="166" font-family="Helvetica, Arial, sans-serif" font-size="29" font-weight="600" fill="#cdd9f0">The AI agent layer for the Adobe Experience Cloud</text>

  <!-- subline -->
  <text x="66" y="202" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#7f90b4">MCP servers &#183; Claude skills &#183; built to Adobe&#8217;s own conventions</text>

  <!-- pillar pills -->
  <g font-family="Helvetica, Arial, sans-serif">
    <g>
      <rect x="64" y="244" width="312" height="58" rx="10" fill="#101c36" stroke="#273a63" stroke-width="1.5"/>
      <text x="84" y="270" font-size="13" letter-spacing="2" fill="#ff6a60" font-weight="700">CONTENT</text>
      <text x="84" y="291" font-size="17" fill="#e6ecfa" font-weight="600">Edge Delivery Services</text>
    </g>
    <g>
      <rect x="392" y="244" width="252" height="58" rx="10" fill="#101c36" stroke="#273a63" stroke-width="1.5"/>
      <text x="412" y="270" font-size="13" letter-spacing="2" fill="#ff6a60" font-weight="700">CREATIVE</text>
      <text x="412" y="291" font-size="17" fill="#e6ecfa" font-weight="600">Firefly Services</text>
    </g>
    <g>
      <rect x="660" y="244" width="300" height="58" rx="10" fill="#101c36" stroke="#273a63" stroke-width="1.5"/>
      <text x="680" y="270" font-size="13" letter-spacing="2" fill="#ff6a60" font-weight="700">DATA</text>
      <text x="680" y="291" font-size="17" fill="#e6ecfa" font-weight="600">Experience Platform</text>
    </g>
  </g>

  <!-- proof tag, top right -->
  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="903" y="40" width="313" height="34" rx="17" fill="#161208" stroke="#5a4a14" stroke-width="1.5"/>
    <text x="924" y="62" font-size="15" fill="#f2c94c" font-weight="600">11 skills merged into adobe/skills</text>
  </g>
</svg>
